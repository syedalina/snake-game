<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snale game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      min-height: 100vh;
      height: 100%;
      min-width: 100vw;
      overflow: hidden;
      background-color: rgb(46, 46, 46);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .container h1 {
      padding-bottom: 1rem;
    }

    .game-area .others {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .game-area .others .score {
      display: flex;
      gap: 0.25rem;
      background-color: rgb(65, 65, 65);
      height: fit-content;
      width: fit-content;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
    }

    .game-area .others #start-btn {
      padding: 0.5rem 1rem;
      background-color: green;
      color: white;
      border: none;
      border-radius: 1rem;
      cursor: pointer;
    }

    .game-area .board {
      background: rgb(72, 67, 67);
      height: 400px;
      width: 400px;
      border-radius: 0.2rem;
      position: relative;
    }

    .game-area .board .snake {
      background-color: green;
      height: 20px;
      width: 20px;
      border-radius: 0.2rem;
      position: absolute;
      /* left: 20px; */
    }

    .game-area .board .food {
      background-color: red;
      height: 20px;
      width: 20px;
      border-radius: 0.2rem;
      position: absolute;
    }

    #user-msg {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.2rem;
      color: red;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>syedAlina Snake game</h1>
    <div class="game-area">
      <p id="user-msg">Game Over please Restart</p>
      <div class="others">
        <button id="start-btn">Start</button>
        <div class="score">
          <p>Score</p>
          <p id="score">0</p>
        </div>
        <div class="score">
          <p>High Score</p>
          <p id="hscore">0</p>
        </div>
      </div>
      <div class="board">
        <div class="snake"></div>
        <div class="food"></div>
      </div>
    </div>
  </div>
  <script>
    // dom elements
    let startBtn = document.querySelector("#start-btn");
    let snake = document.querySelector(".snake");
    let food = document.querySelector(".food");
    let userMsg = document.querySelector("#user-msg");
    let container = document.querySelector(".container");
    let scoreBoard = document.querySelector("#score");
    let highScoreBoard = document.querySelector("#hscore");

    let score = 0;
    let highScore = 0;

    // props
    let direction = { L: "left", R: "right", T: "top", B: "bottom" };

    let snakeLength = 20;
    let snakeDirection = direction.R;


    //variables
    const BOARD_SIZE = 400;
    const CELL_SIZE = 20;
    const TOTAL_CELLS = BOARD_SIZE / CELL_SIZE; // 20

    let isStarted = false;

    // dom operations
    snake.style.left = "0px";
    snake.style.top = "0px";
    placeFood();
    startBtn.addEventListener("click", (e) => {
      isStarted = true;
      console.log(e.target);

      if (e.target.innerText == "Restart") {
        userMsg.style.display = "none";
      }
      e.target.innerText = "Pause";

    });
    snake.style.width = getPxString(snakeLength);

    document.addEventListener("keydown", (e) => {
      if (!isStarted) return;

      if (e.key == "ArrowDown") {
        snakeDirection = direction.B;
        console.log("new dir = ", snakeDirection);
      } else if (e.key == "ArrowUp") {
        snakeDirection = direction.T;
        console.log("new dir = ", snakeDirection);
      } else if (e.key == "ArrowLeft") {
        snakeDirection = direction.L;
        console.log("new dir = ", snakeDirection);
      } else if (e.key == "ArrowRight") {
        snakeDirection = direction.R;
        console.log("new dir = ", snakeDirection);
      } else {
        console.log("galat btn hai ye");
      }
    });

    function moveSnake(d) {
      let x = parseInt(snake.style.left);
      let y = parseInt(snake.style.top);

      if (d === direction.R) {
        snake.style.left = getPxString(x + CELL_SIZE);
      } else if (d === direction.L) {
        snake.style.left = getPxString(x - CELL_SIZE);
      } else if (d === direction.T) {
        snake.style.top = getPxString(y - CELL_SIZE);
      } else if (d === direction.B) {
        snake.style.top = getPxString(y + CELL_SIZE);
      }

      // check for boundaries
      x = parseInt(snake.style.left);
      y = parseInt(snake.style.top);

      if (x < 0 || x >= 400 || y < 0 || y >= 400) {
        resetGame();
      }
    }

    setInterval(() => {
      if (!isStarted) return;
      moveSnake(snakeDirection);
      checkFoodEaten();
    }, 200);

    function getPxString(n) {
      return `${n}px`;
    }

    function placeFood() {
      let x = Math.floor(Math.random() * TOTAL_CELLS) * CELL_SIZE;
      let y = Math.floor(Math.random() * TOTAL_CELLS) * CELL_SIZE;
      console.log(x, y);

      food.style.left = getPxString(x);
      food.style.top = getPxString(y);
    }

    let blinkInterval;

    function checkFoodEaten() {
      let sx = parseInt(snake.style.left);
      let sy = parseInt(snake.style.top);
      let fx = parseInt(food.style.left);
      let fy = parseInt(food.style.top);

      if (sx === fx && sy === fy) {
        score++;
        scoreBoard.innerText = score;
        if (score > highScore) {
          highScore = score;
          highScoreBoard.innerText = highScore;
        }
        placeFood();
      }
    }
    function resetGame() {
      isStarted = false;

      snake.style.left = "0px";
      snake.style.top = "0px";
      snakeDirection = direction.R;
      score = 0;
      scoreBoard.innerText = "0";

      userMsg.style.display = "block";
      startBtn.innerText = "Restart";

      // Stop any previous blinking
      clearInterval(blinkInterval);

      let isRed = false;
      let blinkCount = 0;

      blinkInterval = setInterval(() => {
        container.style.backgroundColor = isRed
          ? "rgb(46, 46, 46)"
          : "rgba(255, 0, 0, 0.9)";

        isRed = !isRed;
        blinkCount++;

        // Stop blinking after 6 flashes
        if (blinkCount === 6) {
          clearInterval(blinkInterval);
          container.style.backgroundColor = "rgb(46, 46, 46)";
        }
      }, 100);
    }
  </script>
</body>

</html>
